services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: product_health
      POSTGRES_USER: ph_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ph_dev_pass}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ph_user -d product_health"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .                    # root context so it can access shared/
      dockerfile: api/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./api/src:/app/api/src
      - ./shared/src:/app/shared/src
      - ~/.aws:/root/.aws:ro
    environment:
      DATABASE_URL: postgresql://ph_user:${DB_PASSWORD:-ph_dev_pass}@db:5432/product_health
      NODE_ENV: development
      PORT: 3000
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_SSO_START_URL: ${AWS_SSO_START_URL:-}
      AWS_SSO_REGION: ${AWS_SSO_REGION:-us-east-1}
      AWS_SSO_ACCOUNT_ID: ${AWS_SSO_ACCOUNT_ID:-}
      AWS_SSO_ROLE_NAME: ${AWS_SSO_ROLE_NAME:-}
      ATHENA_OUTPUT_BUCKET: ${ATHENA_OUTPUT_BUCKET:-}
      ATHENA_WORKGROUP: ${ATHENA_WORKGROUP:-primary}
      ATHENA_DATABASE: ${ATHENA_DATABASE:-qa}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .                    # root context so it can access shared/
      dockerfile: dashboard/Dockerfile
      target: dev                   # use the dev stage (hot reload)
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app/dashboard  # live source mount — edits reflect instantly
      - /app/dashboard/node_modules # anonymous volume: keep container's node_modules
      - ./shared/src:/app/shared/src # mount shared source for hot reload
    environment:
      - NODE_ENV=development
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg_data:
