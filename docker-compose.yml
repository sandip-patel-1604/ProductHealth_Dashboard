services:
  dashboard:
    build:
      context: ./dashboard
      target: dev          # use the dev stage (hot reload)
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app        # live source mount — edits reflect instantly
      - /app/node_modules       # anonymous volume: keep container's node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ph_user
      POSTGRES_PASSWORD: ph_pass
      POSTGRES_DB: product_health
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ph_user -d product_health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://ph_user:ph_pass@db:5432/product_health
    volumes:
      - ./api:/app
    restart: unless-stopped

volumes:
  pg_data:
