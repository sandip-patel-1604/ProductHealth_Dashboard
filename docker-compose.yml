services:
  dashboard:
    build:
      context: ./dashboard
      target: dev          # use the dev stage (hot reload)
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app        # live source mount — edits reflect instantly
      - /app/node_modules       # anonymous volume: keep container's node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
